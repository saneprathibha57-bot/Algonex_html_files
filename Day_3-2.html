Task 3: Multi-Section Learning Platform Page
Objective: Practice complex form and accessibility - learn and implement forms,inputs
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Freshers Application form</h2>
    <form>
        <div>
            <label for="name">full name:</label>
            <input type="text" id="name" name="name" 
            placeholder="Enter your full name" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" 
            placeholder="Enter your email" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" 
            placeholder="Enter your password" required>
        </div>
        <div>
           <label for="phone number">Phone Number:</label>
            <input type="tel" id="phone number" name="phone number" 
            placeholder="Enter your phone number" required>
        </div>
        <div>
            <label for="skills">Skills:</label>
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>
            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>
            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label>
            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label>
            <input type="checkbox" id="java" name="skills" value="Java">
            <label for="java">Java</label>
        </div>
        <div>
            <label for="college">College Name:</label>
            <input type="radio" id="college" name="college"
             value="MJR" required>
            <label for="college">MJR</label>
            <input type="radio" id="college" name="college"
             value="MBU" required>
            <label for="college">MBU</label>
            <input type="radio" id="college" name="college"
             value="VJIT" required>
            <label for="college">VJIT</label>
        </div>
        <div>
            <label for="country">Country:</label>
            <select id="country" name="country" required>
                <option value="">Select your country</option>
                <option value="usa">United States</option>
                <option value="canada">Canada</option>
                <option value="uk">United Kingdom</option>
                <option value=""india">India</option>
                
            </select>

        </div>
        <div>
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
        
        <div>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset"> 
        </div>       
    </form>
    
</body>
</html>
